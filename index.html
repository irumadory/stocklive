<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YouTube 라이브 멀티뷰</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&family=JetBrains+Mono:wght@400;600&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0a0f;--surface:#13131e;--surface2:#1c1c2a;--surface3:#242436;
  --border:#2e2e48;--accent:#ff3535;--accent2:#f4a261;--green:#2ec4b6;
  --text:#eeeeff;--text-dim:#9090be;--text-muted:#505078;--radius:5px;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;overflow:hidden}
.app{display:flex;flex-direction:column;height:100vh}

header{display:flex;align-items:center;gap:10px;padding:0 14px;height:50px;flex-shrink:0;background:var(--surface);border-bottom:2px solid var(--border)}
.logo{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:15px;color:var(--accent);letter-spacing:.08em;white-space:nowrap;flex-shrink:0}
.logo em{color:var(--text-dim);font-style:normal;font-weight:400;font-size:11px;margin-left:3px}
.vline{width:1px;height:24px;background:var(--border);flex-shrink:0}
input{background:var(--surface2);border:1.5px solid var(--border);border-radius:var(--radius);color:var(--text);font-size:13px;font-family:'Noto Sans KR',sans-serif;padding:6px 11px;outline:none;transition:border-color .2s,background .2s}
input:focus{border-color:var(--accent);background:var(--surface3)}
input::placeholder{color:var(--text-muted)}
#apiKey{font-family:'JetBrains Mono',monospace;font-size:11px;width:185px}
#searchInput{flex:1;min-width:160px}
.btn{display:inline-flex;align-items:center;gap:5px;padding:6px 13px;border-radius:var(--radius);font-size:12px;font-family:'Noto Sans KR',sans-serif;font-weight:600;cursor:pointer;border:none;transition:all .15s;white-space:nowrap;flex-shrink:0}
.btn-red{background:var(--accent);color:#fff}.btn-red:hover{background:#ff5252}
.btn-outline{background:transparent;color:var(--text);border:1.5px solid var(--border)}.btn-outline:hover{border-color:var(--accent2);color:var(--accent2)}
.btn-green{background:transparent;color:var(--green);border:1.5px solid var(--green)}.btn-green:hover{background:var(--green);color:#000}
.btn-sm{padding:4px 9px;font-size:11px}
.admin-badge{font-size:10px;font-weight:700;color:var(--green);border:1.5px solid var(--green);border-radius:4px;padding:2px 7px;flex-shrink:0}
.pw-input{background:var(--surface2);border:1.5px solid var(--border);border-radius:var(--radius);color:var(--text);font-size:11px;font-family:'JetBrains Mono',monospace;padding:5px 9px;outline:none;width:120px;transition:border-color .2s}
.pw-input:focus{border-color:var(--accent)}
.pw-input::placeholder{color:var(--text-muted);font-family:'Noto Sans KR',sans-serif}
.live-indicator{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text-dim)}
.live-dot{width:7px;height:7px;border-radius:50%;background:var(--accent);animation:blink 1.4s ease-in-out infinite;flex-shrink:0}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}

.content{display:flex;flex:1;overflow:hidden;min-height:0}

/* 9슬롯 그리드 */
.slot-grid{flex:1;display:grid;min-height:0;grid-template-columns:2.2fr 1fr 1fr 1fr 1fr;grid-template-rows:1fr 1fr;gap:3px;padding:3px;background:#000}
.cell{position:relative;background:var(--surface);border-radius:5px;overflow:hidden;border:2px solid var(--border);transition:border-color .2s;min-height:0}
.cell.main-cell{grid-column:1;grid-row:1/3}
.cell-player{width:100%;height:100%;display:block}
.live-badge-cell{position:absolute;top:7px;left:7px;background:var(--accent);color:#fff;font-size:9px;font-weight:700;letter-spacing:.1em;padding:2px 7px;border-radius:3px;display:flex;align-items:center;gap:3px;z-index:2;pointer-events:none}
.live-badge-cell::before{content:'';width:5px;height:5px;border-radius:50%;background:#fff;animation:blink 1.4s ease-in-out infinite}
.cell-label{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(transparent,rgba(0,0,0,.85));padding:16px 9px 6px;font-size:11px;font-weight:500;color:#fff;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;z-index:2;pointer-events:none}
.cell-status{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;color:var(--text-muted);font-size:11px;pointer-events:none;z-index:2}
.cell-status .spin{display:inline-block;width:18px;height:18px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;margin-bottom:6px}
.ph{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;text-align:center;padding:12px;background:linear-gradient(135deg,#13132a 0%,#0e0e1e 100%)}
.ph-num{font-family:'JetBrains Mono',monospace;font-weight:700;color:#5555aa;line-height:1}
.cell.main-cell .ph-num{font-size:28px;color:#7777cc}
.cell:not(.main-cell) .ph-num{font-size:16px}
.ph-label{font-size:11px;color:#4444aa}

/* 관리자 */
.admin-main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-height:0}
.results-grid{flex:1;overflow-y:auto;display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:8px;padding:10px;background:var(--bg);align-content:start}
.results-grid::-webkit-scrollbar{width:6px}
.results-grid::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
.rcard{background:var(--surface);border-radius:7px;overflow:hidden;border:2px solid var(--border);transition:border-color .2s,box-shadow .15s;cursor:pointer;display:flex;flex-direction:column}
.rcard:hover{border-color:var(--accent);box-shadow:0 5px 18px rgba(255,53,53,.15)}
.rcard.selected{border-color:var(--green);box-shadow:0 0 0 1px var(--green)}
.rcard-thumb{position:relative;width:100%;padding-top:56.25%;background:#000;overflow:hidden}
.rcard-thumb iframe{position:absolute;inset:0;width:100%;height:100%;border:none;pointer-events:none}
.rcard-live{position:absolute;top:6px;left:6px;background:var(--accent);color:#fff;font-size:9px;font-weight:700;padding:2px 6px;border-radius:3px;display:flex;align-items:center;gap:3px;z-index:2;pointer-events:none}
.rcard-live::before{content:'';width:5px;height:5px;border-radius:50%;background:#fff;animation:blink 1.4s ease-in-out infinite}
.rcard-added{position:absolute;top:6px;right:6px;background:var(--green);color:#000;font-size:9px;font-weight:700;padding:2px 6px;border-radius:3px;z-index:2;pointer-events:none}
.rcard-body{padding:8px 10px 10px}
.rcard-title{font-size:11px;font-weight:600;color:var(--text);line-height:1.4;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;margin-bottom:3px}
.rcard-ch{font-size:10px;color:var(--text-dim);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.rcard-actions{display:flex;gap:5px;margin-top:7px}
.rcard-btn{flex:1;padding:4px 0;font-size:10px;font-weight:600;border-radius:3px;border:none;cursor:pointer;transition:all .15s;text-align:center}
.rcard-btn-place{background:rgba(46,196,182,.15);color:var(--green);border:1px solid rgba(46,196,182,.3)}.rcard-btn-place:hover{background:var(--green);color:#000}
.rcard-btn-yt{background:rgba(255,53,53,.12);color:var(--accent);border:1px solid rgba(255,53,53,.25)}.rcard-btn-yt:hover{background:var(--accent);color:#fff}

.sidebar{width:260px;flex-shrink:0;background:var(--surface);border-left:2px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.sb-head{padding:10px 13px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.sb-title{font-size:12px;font-weight:700;color:var(--text)}
.sb-count{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--accent);font-weight:700}
.sb-list{flex:1;overflow-y:auto;padding:3px 0}
.sb-list::-webkit-scrollbar{width:4px}
.sb-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.sb-notice{padding:7px 13px;font-size:10px;color:var(--text-muted);line-height:1.6;border-bottom:1px solid var(--border);flex-shrink:0;background:rgba(46,196,182,.04)}
.ci{display:flex;align-items:center;gap:6px;padding:8px 13px;border-bottom:1px solid rgba(46,46,72,.6)}
.ci-order{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text-muted);flex-shrink:0;width:16px;text-align:center}
.ci-info{flex:1;min-width:0}
.ci-name{font-size:12px;font-weight:600;color:var(--text)}
.ci-id{font-size:9px;color:var(--text-muted);font-family:'JetBrains Mono',monospace;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-top:1px}
.ci-del{background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:16px;padding:2px 4px;border-radius:3px;transition:color .15s;flex-shrink:0}
.ci-del:hover{color:var(--accent)}
.ci-up,.ci-dn{background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:11px;padding:2px 3px;border-radius:3px;transition:color .15s;flex-shrink:0}
.ci-up:hover,.ci-dn:hover{color:var(--accent2)}
.add-ch-form{padding:10px 13px;border-top:2px solid var(--border);display:flex;flex-direction:column;gap:6px;flex-shrink:0}
.add-ch-form input{font-size:12px;padding:6px 9px;width:100%}
.add-ch-row{display:flex;gap:5px}
.add-ch-row input{flex:1}
.add-ch-hdr{font-size:11px;font-weight:700;color:var(--text-dim);text-transform:uppercase;letter-spacing:.06em}

.statusbar{height:28px;background:var(--surface);border-top:2px solid var(--border);display:flex;align-items:center;padding:0 14px;gap:16px;font-size:10px;color:var(--text-dim);font-family:'JetBrains Mono',monospace;flex-shrink:0}
.s-live{color:var(--accent);font-weight:700}
.s-slots{color:var(--green);font-weight:700}
.s-hint{margin-left:auto;font-size:10px;color:var(--text-muted);font-family:'Noto Sans KR',sans-serif}

.empty-state{grid-column:1/-1;padding:60px 20px;text-align:center;color:var(--text-dim);font-size:13px;line-height:1.9}
.empty-state .ei{font-size:40px;margin-bottom:12px;display:block;opacity:.5}
.spinner{display:inline-block;width:20px;height:20px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

.toast{position:fixed;bottom:40px;left:50%;transform:translateX(-50%);background:var(--surface3);border:1.5px solid var(--border);border-radius:6px;padding:8px 16px;font-size:12px;color:var(--text);pointer-events:none;z-index:9999;white-space:nowrap;opacity:0;transition:opacity .2s;box-shadow:0 4px 20px rgba(0,0,0,.6)}
.toast.show{opacity:1}
</style>
</head>
<body>
<div class="app" id="app"></div>
<div class="toast" id="toast"></div>

<!-- YouTube IFrame API -->
<script src="https://www.youtube.com/iframe_api"></script>
<script>
// ════════════════════════════════════════
// ★ 설정
// ════════════════════════════════════════
const ADMIN_PASSWORD = 'iruma2024';

// ════════════════════════════════════════
// 후보 채널 목록 (💾 배치 저장 시 이 부분이 교체됨)
// ════════════════════════════════════════
let candidateChannels = [{"channelId":"UC_iT-dQV96rPviS4G4p5b9A","channelName":"1waynews 한길뉴스"},{"channelId":"UCY3qNbCdxhfEIjSBpC24X6g","channelName":"아시아투데이"},{"channelId":"UClWM2V6Hfp-grcXR0JEs3rA","channelName":"쿨맨tv"},{"channelId":"UCT8MkqvkDmkHRVDhakk92YQ","channelName":"유리"},{"channelId":"UC5FvUjsW_nkgSCdNm756nQA","channelName":"유재명"},{"channelId":"UCJNIJsUluHhuikAost77oCw","channelName":"쿨가이 tv"},{"channelId":"UCWS0tefWL5UpQsZI2yc8ASg","channelName":"일롱 머스크"},{"channelId":"UCFD4SJ_zPtqJotoqWdnRDLw","channelName":"팩트룸코리아"},{"channelId":"UCsaIrvP4Xzjcf031idR1bCA","channelName":"전사 부배달"}];

// ════════════════════════════════════════
// 상태
// ════════════════════════════════════════
const N = 9;
let isAdmin = false;
let searchResults = [];
let ytApiReady = false;

// 뷰어 슬롯 상태
const viewerSlots = Array.from({length:N}, (_,i) => ({
  slotIdx: i,
  channelIdx: i,   // 현재 사용 중인 candidateChannels 인덱스
  player: null,
  isActive: false
}));

// YouTube IFrame API 준비 콜백
function onYouTubeIframeAPIReady(){
  ytApiReady = true;
  if(!isAdmin) initViewerPlayers();
}

// ════════════════════════════════════════
// 앱 렌더
// ════════════════════════════════════════
document.addEventListener('DOMContentLoaded', ()=> renderApp());

function renderApp(){
  document.getElementById('app').innerHTML = isAdmin ? buildAdmin() : buildViewer();
  isAdmin ? initAdmin() : (ytApiReady ? initViewerPlayers() : null);
}

// ════════════════════════════════════════
// 방문자 화면
// ════════════════════════════════════════
function buildViewer(){
  return `
  <header>
    <div class="logo">LIVE<em>VIEW</em></div>
    <div class="vline"></div>
    <div class="live-indicator">
      <div class="live-dot"></div>
      <span id="vLiveLabel" style="font-size:12px;color:var(--text-dim)">채널 연결 중...</span>
    </div>
    <div style="display:flex;align-items:center;gap:8px;margin-left:auto">
      <input class="pw-input" type="password" id="adminPwInput" placeholder="관리자">
      <button class="btn btn-outline btn-sm" onclick="tryLogin()">접속</button>
    </div>
  </header>
  <div class="content">
    <div class="slot-grid" id="viewerGrid"></div>
  </div>
  <div class="statusbar">
    <span><span class="s-live" id="vLiveCount">● 0</span>&nbsp;라이브 재생 중</span>
    <span class="s-hint">슬롯 클릭 → 유튜브에서 열기</span>
  </div>`;
}

function initViewerPlayers(){
  const wrap = document.getElementById('viewerGrid');
  if(!wrap) return;
  wrap.innerHTML = '';

  for(let i=0; i<N; i++){
    const cell = document.createElement('div');
    cell.className = 'cell' + (i===0?' main-cell':'');
    cell.id = `cell-${i}`;

    // 플레이어 div
    const playerDiv = document.createElement('div');
    playerDiv.id = `player-${i}`;
    playerDiv.className = 'cell-player';
    cell.appendChild(playerDiv);

    // 라이브 뱃지
    const badge = document.createElement('div');
    badge.className = 'live-badge-cell';
    badge.id = `badge-${i}`;
    badge.style.display = 'none';
    badge.textContent = 'LIVE';
    cell.appendChild(badge);

    // 채널명 라벨
    const label = document.createElement('div');
    label.className = 'cell-label';
    label.id = `label-${i}`;
    cell.appendChild(label);

    // 로딩 상태
    const status = document.createElement('div');
    status.className = 'cell-status';
    status.id = `status-${i}`;
    status.innerHTML = `<div class="spin"></div><br>연결 중...`;
    cell.appendChild(status);

    wrap.appendChild(cell);

    // 클릭 → 유튜브 이동
    cell.addEventListener('click', e=>{
      if(e.target.tagName==='IFRAME') return;
      const ch = candidateChannels[viewerSlots[i].channelIdx];
      if(ch) window.open(`https://www.youtube.com/channel/${ch.channelId}`,'_blank');
    });

    // YT Player 생성
    createPlayer(i, i);
  }
}

function createPlayer(slotIdx, chIdx){
  if(chIdx >= candidateChannels.length){
    // 후보 채널 소진
    showPlaceholder(slotIdx);
    return;
  }
  const ch = candidateChannels[chIdx];
  viewerSlots[slotIdx].channelIdx = chIdx;

  // 라벨 업데이트
  const label = document.getElementById(`label-${slotIdx}`);
  if(label) label.textContent = ch.channelName;

  // 상태 표시
  const status = document.getElementById(`status-${slotIdx}`);
  if(status){ status.innerHTML=`<div class="spin"></div><br>${ch.channelName} 연결 중...`; status.style.display='block'; }

  // 기존 플레이어 제거
  if(viewerSlots[slotIdx].player){
    try{ viewerSlots[slotIdx].player.destroy(); }catch(e){}
    viewerSlots[slotIdx].player = null;
  }

  // 플레이어 div 재생성
  const cell = document.getElementById(`cell-${slotIdx}`);
  let pd = document.getElementById(`player-${slotIdx}`);
  if(pd) pd.remove();
  pd = document.createElement('div');
  pd.id = `player-${slotIdx}`;
  pd.className = 'cell-player';
  cell.insertBefore(pd, cell.firstChild);

  const player = new YT.Player(`player-${slotIdx}`, {
    width: '100%',
    height: '100%',
    playerVars:{
      autoplay: 1,
      mute: 1,
      controls: 1,
      rel: 0,
      modestbranding: 1,
      playsinline: 1
    },
    events:{
      onReady: (e)=>{
        e.target.loadVideoByPlayerVars ? null : null;
        // 채널 라이브 스트림 로드
        e.target.loadVideoByPlayerVars = undefined;
        e.target.getIframe().src =
          `https://www.youtube.com/embed/live_stream?channel=${ch.channelId}&autoplay=1&mute=1&rel=0&modestbranding=1&enablejsapi=1&origin=${location.origin}`;
        // 상태 숨김
        const st = document.getElementById(`status-${slotIdx}`);
        if(st) st.style.display='none';
        // 뱃지 표시
        const bg = document.getElementById(`badge-${slotIdx}`);
        if(bg) bg.style.display='flex';
        viewerSlots[slotIdx].isActive = true;
        updateLiveCount();
      },
      onStateChange: (e)=>{
        // -1: 시작안됨, 0: 종료, 1: 재생중, 2: 일시정지, 3: 버퍼링, 5: 큐
        if(e.data === YT.PlayerState.ENDED || e.data === -1){
          // 라이브 종료 or 영상 없음 → 다음 후보로
          setTimeout(()=> tryNextChannel(slotIdx), 2000);
        }
      },
      onError: (e)=>{
        // 오류 코드: 2, 5, 100, 101, 150 → 다음 후보로 교체
        setTimeout(()=> tryNextChannel(slotIdx), 1500);
      }
    }
  });
  viewerSlots[slotIdx].player = player;
}

function tryNextChannel(slotIdx){
  // 현재 슬롯의 다음 후보 채널 찾기
  // 이미 다른 슬롯에서 사용 중인 채널 제외
  const usedIdxs = new Set(viewerSlots.map(s=>s.channelIdx));
  let nextIdx = viewerSlots[slotIdx].channelIdx + 1;

  while(nextIdx < candidateChannels.length){
    if(!usedIdxs.has(nextIdx)) break;
    nextIdx++;
  }

  if(nextIdx >= candidateChannels.length){
    // 더 이상 후보 없음
    showPlaceholder(slotIdx);
    viewerSlots[slotIdx].isActive = false;
    updateLiveCount();
    return;
  }

  createPlayer(slotIdx, nextIdx);
}

function showPlaceholder(slotIdx){
  const badge = document.getElementById(`badge-${slotIdx}`);
  const label = document.getElementById(`label-${slotIdx}`);
  const status = document.getElementById(`status-${slotIdx}`);
  if(badge) badge.style.display='none';
  if(label) label.textContent='';
  if(status){ status.innerHTML=`<div style="font-size:20px;opacity:.3">📺</div><br>대기 중`; status.style.display='block'; }
  viewerSlots[slotIdx].isActive = false;
  updateLiveCount();
}

function updateLiveCount(){
  const count = viewerSlots.filter(s=>s.isActive).length;
  const el = document.getElementById('vLiveCount');
  const lb = document.getElementById('vLiveLabel');
  if(el) el.textContent = `● ${count}`;
  if(lb) lb.textContent = `${count}개 채널 라이브`;
}

// ════════════════════════════════════════
// 관리자 화면
// ════════════════════════════════════════
function buildAdmin(){
  return `
  <header>
    <div class="logo">LIVE<em>VIEW</em></div>
    <div class="vline"></div>
    <span class="admin-badge">🔧 ADMIN</span>
    <div class="vline"></div>
    <span style="font-size:10px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.06em;flex-shrink:0">API KEY</span>
    <input type="password" id="apiKey" placeholder="YouTube Data API v3 키" value="${sessionStorage.getItem('lv_api')||''}">
    <div class="vline"></div>
    <input type="text" id="searchInput" placeholder="검색어 (예: 잠실, 부정선거, 주식 라이브...)">
    <button class="btn btn-red" id="btnLive">🔴 라이브만</button>
    <button class="btn btn-outline" id="btnAll">🔍 전체</button>
    <div class="vline"></div>
    <button class="btn btn-green" id="btnSave">💾 배치 저장</button>
    <button class="btn btn-outline btn-sm" id="btnLogout">로그아웃</button>
  </header>
  <div class="content">
    <div class="admin-main">
      <div class="results-grid" id="resultsGrid">
        <div class="empty-state">
          <span class="ei">🔍</span>
          검색어를 입력하고 채널을 찾으세요.<br>
          <span style="font-size:11px;color:var(--text-muted)">
            <strong style="color:var(--green)">+ 후보 추가</strong> 클릭 → 오른쪽 목록에 추가<br>
            9개 이상 등록 권장 (오류/종료 시 자동 교체)
          </span>
        </div>
      </div>
    </div>
    <div class="sidebar">
      <div class="sb-head">
        <span class="sb-title">📋 후보 채널</span>
        <span class="sb-count" id="sbCount">${candidateChannels.length}</span>
      </div>
      <div class="sb-notice">
        순서대로 9슬롯 자동 배치<br>
        오류·종료 시 다음 후보로 자동 교체 (IFrame API)
      </div>
      <div class="sb-list" id="sbList"></div>
      <div class="add-ch-form">
        <div class="add-ch-hdr">채널 직접 추가</div>
        <input type="text" id="mChName" placeholder="채널 이름">
        <div class="add-ch-row">
          <input type="text" id="mChId" placeholder="채널ID (UCxxxxxxxx...)">
          <button class="btn btn-red btn-sm" onclick="addChDirect()">추가</button>
        </div>
      </div>
    </div>
  </div>
  <div class="statusbar">
    <span><span class="s-live">● ${candidateChannels.length}</span>&nbsp;후보 채널</span>
    <span class="s-slots" id="sSlots">검색결과 0</span>
    <span class="s-hint">오류/종료 감지 시 자동 교체 &nbsp;|&nbsp; 💾 배치 저장 → GitHub 업로드</span>
  </div>`;
}

function initAdmin(){
  document.getElementById('btnLive').addEventListener('click', ()=>doSearch(true));
  document.getElementById('btnAll').addEventListener('click', ()=>doSearch(false));
  document.getElementById('btnSave').addEventListener('click', saveLayout);
  document.getElementById('btnLogout').addEventListener('click', logout);
  document.getElementById('searchInput').addEventListener('keydown', e=>{if(e.key==='Enter') doSearch(false)});
  document.getElementById('apiKey').addEventListener('change', ()=>{
    sessionStorage.setItem('lv_api', document.getElementById('apiKey').value.trim());
  });
  renderCandidateList();
}

function renderCandidateList(){
  const list = document.getElementById('sbList');
  const cnt  = document.getElementById('sbCount');
  if(!list) return;
  if(cnt) cnt.textContent = candidateChannels.length;
  if(!candidateChannels.length){
    list.innerHTML='<div style="padding:20px;text-align:center;color:var(--text-muted);font-size:12px">후보 채널이 없습니다.</div>';
    return;
  }
  list.innerHTML = candidateChannels.map((ch,i)=>`
    <div class="ci">
      <div class="ci-order">${i+1}</div>
      <div class="ci-info">
        <div class="ci-name">${esc(ch.channelName)}</div>
        <div class="ci-id">${ch.channelId}</div>
      </div>
      <button class="ci-up" onclick="moveCh(${i},-1)">▲</button>
      <button class="ci-dn" onclick="moveCh(${i},1)">▼</button>
      <button class="ci-del" onclick="delCh(${i})">×</button>
    </div>`).join('');
}

function moveCh(i,dir){
  const j=i+dir;
  if(j<0||j>=candidateChannels.length) return;
  [candidateChannels[i],candidateChannels[j]]=[candidateChannels[j],candidateChannels[i]];
  renderCandidateList();
}
function delCh(i){ candidateChannels.splice(i,1); renderCandidateList(); }

function addChDirect(){
  const name=document.getElementById('mChName').value.trim();
  const cid=document.getElementById('mChId').value.trim();
  if(!name||!cid){ toast('이름과 채널ID를 모두 입력해주세요.'); return; }
  if(!/^UC[a-zA-Z0-9_-]{22}$/.test(cid)){ toast('채널ID는 UC로 시작하는 24자리여야 합니다.'); return; }
  candidateChannels.push({channelId:cid,channelName:name});
  document.getElementById('mChName').value='';
  document.getElementById('mChId').value='';
  renderCandidateList();
  toast(`"${name}" 추가 완료`);
}

// ════════════════════════════════════════
// 검색
// ════════════════════════════════════════
async function doSearch(liveOnly){
  const key=document.getElementById('apiKey').value.trim();
  const q=document.getElementById('searchInput').value.trim();
  if(!key){ toast('API 키를 먼저 입력해주세요.'); return; }
  if(!q){ toast('검색어를 입력해주세요.'); return; }

  document.getElementById('resultsGrid').innerHTML=`<div class="empty-state"><div class="spinner"></div><br><br>검색 중...</div>`;
  document.getElementById('sSlots').textContent='검색 중...';

  const params=new URLSearchParams({
    part:'snippet',q,type:'video',maxResults:50,key,
    relevanceLanguage:'ko',order:'viewCount',
    ...(liveOnly?{eventType:'live'}:{})
  });

  try{
    const res=await fetch(`https://www.googleapis.com/youtube/v3/search?${params}`);
    const data=await res.json();
    if(data.error) throw new Error(data.error.message);
    searchResults=(data.items||[]).map(item=>({
      videoId:item.id.videoId,
      channelId:item.snippet.channelId,
      channelName:item.snippet.channelTitle,
      title:item.snippet.title,
      isLive:item.snippet.liveBroadcastContent==='live',
    }));
    renderResultCards(searchResults);
    document.getElementById('sSlots').textContent=`검색결과 ${searchResults.length}개`;
  }catch(err){
    document.getElementById('resultsGrid').innerHTML=`<div class="empty-state" style="color:var(--accent)">⚠️ ${esc(err.message)}</div>`;
  }
}

function renderResultCards(items){
  const grid=document.getElementById('resultsGrid');
  if(!items.length){ grid.innerHTML='<div class="empty-state">검색 결과가 없습니다.</div>'; return; }
  const addedIds=new Set(candidateChannels.map(c=>c.channelId));
  grid.innerHTML=items.map((r,idx)=>{
    const isAdded=addedIds.has(r.channelId);
    const embedSrc=r.isLive
      ?`https://www.youtube.com/embed/live_stream?channel=${r.channelId}&autoplay=1&mute=1&rel=0&modestbranding=1`
      :`https://www.youtube.com/embed/${r.videoId}?autoplay=0&mute=1&rel=0&modestbranding=1`;
    return `
    <div class="rcard ${isAdded?'selected':''}">
      <div class="rcard-thumb">
        <iframe src="${embedSrc}" allow="autoplay;encrypted-media" allowfullscreen></iframe>
        ${r.isLive?'<div class="rcard-live">LIVE</div>':''}
        ${isAdded?'<div class="rcard-added">✓ 추가됨</div>':''}
      </div>
      <div class="rcard-body">
        <div class="rcard-title">${esc(r.title)}</div>
        <div class="rcard-ch">${esc(r.channelName)}</div>
        <div class="rcard-actions">
          <button class="rcard-btn rcard-btn-place" onclick="addToCandidate(${idx})">${isAdded?'✓ 추가됨':'+ 후보 추가'}</button>
          <button class="rcard-btn rcard-btn-yt" onclick="event.stopPropagation();window.open('https://www.youtube.com/watch?v=${r.videoId}','_blank')">↗ YT</button>
        </div>
      </div>
    </div>`}).join('');
}

function addToCandidate(idx){
  const r=searchResults[idx];
  if(candidateChannels.find(c=>c.channelId===r.channelId)){ toast('이미 추가된 채널입니다.'); return; }
  candidateChannels.push({channelId:r.channelId,channelName:r.channelName});
  renderCandidateList();
  renderResultCards(searchResults);
  toast(`"${r.channelName}" 후보 채널 추가됨`);
}

// ════════════════════════════════════════
// 배치 저장 → index.html 다운로드
// ════════════════════════════════════════
function saveLayout(){
  if(!candidateChannels.length){ toast('후보 채널이 없습니다.'); return; }
  const chJson=JSON.stringify(candidateChannels);
  let html=document.documentElement.outerHTML;
  html=html.replace(
    /let candidateChannels\s*=\s*\[[\s\S]*?\];/,
    `let candidateChannels = ${chJson};`
  );
  const blob=new Blob([html],{type:'text/html;charset=utf-8'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='index.html';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(a.href);
  toast(`✅ index.html 다운로드 완료! (${candidateChannels.length}개 채널) GitHub에 업로드하세요.`);
}

// ════════════════════════════════════════
// 로그인 / 로그아웃
// ════════════════════════════════════════
function tryLogin(){
  const pw=document.getElementById('adminPwInput').value.trim();
  if(pw===ADMIN_PASSWORD){ isAdmin=true; renderApp(); toast('관리자 모드'); }
  else{ toast('비밀번호가 틀렸습니다.'); document.getElementById('adminPwInput').value=''; }
}
function logout(){ isAdmin=false; renderApp(); }

// ════════════════════════════════════════
// 헬퍼
// ════════════════════════════════════════
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;')}
let _tt;
function toast(msg){const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');clearTimeout(_tt);_tt=setTimeout(()=>el.classList.remove('show'),2800)}
</script>
</body>
</html>
