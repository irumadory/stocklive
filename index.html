<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YouTube 라이브 멀티뷰</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&family=JetBrains+Mono:wght@400;600&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0a0f; --surface:#13131e; --surface2:#1c1c2a; --surface3:#242436;
  --border:#2e2e48; --accent:#ff3535; --accent2:#f4a261; --green:#2ec4b6;
  --text:#eeeeff; --text-dim:#9090be; --text-muted:#505078; --radius:5px;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;overflow:hidden}
.app{display:flex;flex-direction:column;height:100vh}

/* ── HEADER ── */
header{
  display:flex;align-items:center;gap:10px;padding:0 14px;
  height:50px;flex-shrink:0;background:var(--surface);border-bottom:2px solid var(--border);
}
.logo{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:15px;color:var(--accent);letter-spacing:.08em;white-space:nowrap;flex-shrink:0}
.logo em{color:var(--text-dim);font-style:normal;font-weight:400;font-size:11px;margin-left:3px}
.vline{width:1px;height:24px;background:var(--border);flex-shrink:0}
input{background:var(--surface2);border:1.5px solid var(--border);border-radius:var(--radius);color:var(--text);font-size:13px;font-family:'Noto Sans KR',sans-serif;padding:6px 11px;outline:none;transition:border-color .2s,background .2s}
input:focus{border-color:var(--accent);background:var(--surface3)}
input::placeholder{color:var(--text-muted)}
#apiKey{font-family:'JetBrains Mono',monospace;font-size:11px;width:185px}
#searchInput{flex:1;min-width:160px}
.btn{display:inline-flex;align-items:center;gap:5px;padding:6px 13px;border-radius:var(--radius);font-size:12px;font-family:'Noto Sans KR',sans-serif;font-weight:600;cursor:pointer;border:none;transition:all .15s;white-space:nowrap;flex-shrink:0}
.btn-red{background:var(--accent);color:#fff}
.btn-red:hover{background:#ff5252}
.btn-outline{background:transparent;color:var(--text);border:1.5px solid var(--border)}
.btn-outline:hover{border-color:var(--accent2);color:var(--accent2)}
.btn-green{background:transparent;color:var(--green);border:1.5px solid var(--green)}
.btn-green:hover{background:var(--green);color:#000}
.btn-sm{padding:4px 9px;font-size:11px}
.admin-badge{font-size:10px;font-weight:700;color:var(--green);border:1.5px solid var(--green);border-radius:4px;padding:2px 7px;flex-shrink:0}

/* viewer header pw */
.viewer-right{display:flex;align-items:center;gap:8px;margin-left:auto}
.pw-input{background:var(--surface2);border:1.5px solid var(--border);border-radius:var(--radius);color:var(--text);font-size:11px;font-family:'JetBrains Mono',monospace;padding:5px 9px;outline:none;width:120px;transition:border-color .2s}
.pw-input:focus{border-color:var(--accent)}
.pw-input::placeholder{color:var(--text-muted);font-family:'Noto Sans KR',sans-serif}
.live-indicator{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text-dim)}
.live-dot{width:7px;height:7px;border-radius:50%;background:var(--accent);animation:blink 1.4s ease-in-out infinite;flex-shrink:0}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}

/* ── CONTENT ── */
.content{display:flex;flex:1;overflow:hidden;min-height:0}

/* ════════════════════════════════
   VIEWER: 9슬롯 고정 라이브
   ════════════════════════════════ */
.viewer-grid{
  flex:1;display:grid;min-height:0;
  grid-template-columns:2.2fr 1fr 1fr 1fr 1fr;
  grid-template-rows:1fr 1fr;
  gap:3px;padding:3px;background:#000;
}
.cell{position:relative;background:var(--surface);border-radius:5px;overflow:hidden;border:2px solid var(--border);transition:border-color .2s;min-height:0}
.cell.main-cell{grid-column:1;grid-row:1/3}
.cell iframe{width:100%;height:100%;border:none;display:block}
.live-badge-cell{position:absolute;top:7px;left:7px;background:var(--accent);color:#fff;font-size:9px;font-weight:700;letter-spacing:.1em;padding:2px 7px;border-radius:3px;display:flex;align-items:center;gap:3px;z-index:2;pointer-events:none}
.live-badge-cell::before{content:'';width:5px;height:5px;border-radius:50%;background:#fff;animation:blink 1.4s ease-in-out infinite}
.cell-label{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(transparent,rgba(0,0,0,.85));padding:16px 9px 6px;font-size:11px;font-weight:500;color:#fff;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;z-index:2;pointer-events:none}
.ph{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;text-align:center;padding:12px;background:linear-gradient(135deg,#13132a 0%,#0e0e1e 100%)}
.ph-num{font-family:'JetBrains Mono',monospace;font-weight:700;color:#5555aa;line-height:1}
.cell.main-cell .ph-num{font-size:28px;color:#7777cc}
.cell:not(.main-cell) .ph-num{font-size:16px}
.ph-label{font-size:11px;color:#4444aa}
.cell.main-cell .ph-label{font-size:12px;color:#6666bb}

/* ════════════════════════════════
   ADMIN: 검색결과 스크롤 그리드
   ════════════════════════════════ */
.admin-main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-height:0}

/* 검색결과 카드 그리드 — 스크롤 */
.results-grid{
  flex:1;overflow-y:auto;
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
  gap:8px;padding:10px;
  background:var(--bg);
  align-content:start;
}
.results-grid::-webkit-scrollbar{width:6px}
.results-grid::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

/* 검색결과 카드 */
.rcard{
  background:var(--surface);border-radius:7px;overflow:hidden;
  border:2px solid var(--border);transition:border-color .2s,box-shadow .15s;
  cursor:pointer;display:flex;flex-direction:column;
}
.rcard:hover{border-color:var(--accent);box-shadow:0 5px 18px rgba(255,53,53,.15)}
.rcard.selected{border-color:var(--green);box-shadow:0 0 0 1px var(--green)}

/* 라이브 embed 썸네일 */
.rcard-thumb{position:relative;width:100%;padding-top:56.25%;background:#000;overflow:hidden}
.rcard-thumb iframe{position:absolute;inset:0;width:100%;height:100%;border:none;pointer-events:none}
.rcard-live{position:absolute;top:6px;left:6px;background:var(--accent);color:#fff;font-size:9px;font-weight:700;letter-spacing:.08em;padding:2px 6px;border-radius:3px;display:flex;align-items:center;gap:3px;z-index:2;pointer-events:none}
.rcard-live::before{content:'';width:5px;height:5px;border-radius:50%;background:#fff;animation:blink 1.4s ease-in-out infinite}
.rcard-slot{position:absolute;top:6px;right:6px;background:var(--green);color:#000;font-size:9px;font-weight:700;padding:2px 6px;border-radius:3px;font-family:'JetBrains Mono',monospace;z-index:2;pointer-events:none}

.rcard-body{padding:8px 10px 10px}
.rcard-title{font-size:11px;font-weight:600;color:var(--text);line-height:1.4;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;margin-bottom:3px}
.rcard-ch{font-size:10px;color:var(--text-dim);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.rcard-actions{display:flex;gap:5px;margin-top:7px}
.rcard-btn{flex:1;padding:4px 0;font-size:10px;font-weight:600;border-radius:3px;border:none;cursor:pointer;transition:all .15s;text-align:center}
.rcard-btn-place{background:rgba(46,196,182,.15);color:var(--green);border:1px solid rgba(46,196,182,.3)}
.rcard-btn-place:hover{background:var(--green);color:#000}
.rcard-btn-yt{background:rgba(255,53,53,.12);color:var(--accent);border:1px solid rgba(255,53,53,.25)}
.rcard-btn-yt:hover{background:var(--accent);color:#fff}

/* 슬롯 선택 바 */
.slot-bar{
  display:flex;align-items:center;gap:6px;
  padding:7px 10px;background:var(--surface2);border-bottom:1px solid var(--border);
  flex-shrink:0;overflow-x:auto;
}
.slot-bar::-webkit-scrollbar{height:3px}
.slot-bar::-webkit-scrollbar-thumb{background:var(--border)}
.slot-bar-label{font-size:11px;color:var(--text-dim);white-space:nowrap;flex-shrink:0}
.slot-chip{
  display:inline-flex;align-items:center;gap:4px;
  padding:3px 9px;border-radius:4px;font-size:10px;font-weight:700;
  font-family:'JetBrains Mono',monospace;cursor:pointer;border:1.5px solid var(--border);
  background:var(--surface);color:var(--text-muted);transition:all .15s;white-space:nowrap;flex-shrink:0;
}
.slot-chip:hover{border-color:var(--accent2);color:var(--accent2)}
.slot-chip.filled{border-color:var(--green);color:var(--green);background:rgba(46,196,182,.08)}
.slot-chip.selected{border-color:var(--accent);color:#fff;background:var(--accent)}

/* ── STATUSBAR ── */
.statusbar{height:28px;background:var(--surface);border-top:2px solid var(--border);display:flex;align-items:center;padding:0 14px;gap:16px;font-size:10px;color:var(--text-dim);font-family:'JetBrains Mono',monospace;flex-shrink:0}
.s-live{color:var(--accent);font-weight:700}
.s-slots{color:var(--green);font-weight:700}
.s-hint{margin-left:auto;font-size:10px;color:var(--text-muted);font-family:'Noto Sans KR',sans-serif}

/* ── EMPTY / LOADING ── */
.empty-state{grid-column:1/-1;padding:60px 20px;text-align:center;color:var(--text-dim);font-size:13px;line-height:1.9}
.empty-state .ei{font-size:40px;margin-bottom:12px;display:block;opacity:.5}
.empty-state .sub{font-size:11px;color:var(--text-muted);margin-top:6px}
.spinner{display:inline-block;width:20px;height:20px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── TOAST ── */
.toast{position:fixed;bottom:40px;left:50%;transform:translateX(-50%);background:var(--surface3);border:1.5px solid var(--border);border-radius:6px;padding:8px 16px;font-size:12px;color:var(--text);pointer-events:none;z-index:9999;white-space:nowrap;opacity:0;transition:opacity .2s;box-shadow:0 4px 20px rgba(0,0,0,.6)}
.toast.show{opacity:1}

/* ── MODAL ── */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.8);display:flex;align-items:center;justify-content:center;z-index:9998;opacity:0;pointer-events:none;transition:opacity .2s}
.modal-bg.show{opacity:1;pointer-events:all}
.modal{background:var(--surface2);border:1.5px solid var(--border);border-radius:10px;padding:24px 28px;max-width:440px;width:92%}
.modal h3{font-size:15px;font-weight:700;color:var(--text);margin-bottom:13px}
.modal p{font-size:12px;color:var(--text-dim);line-height:1.8;margin-bottom:7px}
.modal code{background:var(--surface3);border-radius:3px;padding:1px 6px;font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--accent2)}
</style>
</head>
<body>
<div class="app" id="app"></div>
<div class="toast" id="toast"></div>
<div class="modal-bg" id="modalBg" onclick="if(event.target===this)hideModal()">
  <div class="modal" id="modalContent"></div>
</div>

<script>
// ══════════════════════════════════════════
// ★ 설정
// ══════════════════════════════════════════
const ADMIN_PASSWORD = 'iruma2024';  // ← 비밀번호 변경

// ══════════════════════════════════════════
// 상태
// ══════════════════════════════════════════
const N = 9;
let slots = Array.from({length:N}, (_,i) => ({
  id:i, channelId:null, channelName:'', videoTitle:''
}));
let isAdmin = false;
let searchResults = [];
let selectedSlot = null; // 현재 배치 대상 슬롯
let savedChannels = JSON.parse(localStorage.getItem('lv_channels') || '[]');
const savedLayout = [{"id":0,"channelId":"UC_iT-dQV96rPviS4G4p5b9A","channelName":"1waynews 한길뉴스","videoTitle":"[LIVE2] 현장중계 I 6.3 잠실 자유민주화운동 올림픽공원"},{"id":1,"channelId":"UCY3qNbCdxhfEIjSBpC24X6g","channelName":"아시아투데이","videoTitle":"[🔴아투 LIVE] 일촉즉발 잠실 &#39;재선거&#39; 시위 현장...&#39;1,104표 증발&#39; 첩첩산중 선관위_260611"},{"id":2,"channelId":"UClWM2V6Hfp-grcXR0JEs3rA","channelName":"쿨맨tv","videoTitle":"2026/6/12#7일째#잠실 현장 #실시간 라이브"},{"id":3,"channelId":"UCT8MkqvkDmkHRVDhakk92YQ","channelName":"유리","videoTitle":"🔴잠실 핸드볼 경기장"},{"id":4,"channelId":"UC5FvUjsW_nkgSCdNm756nQA","channelName":"유재명 yujaemyeong","videoTitle":"[올림픽공원 현장 생중계 실시간 라이브] 잠실 올림픽공원 핸드볼경기장 재선거 요구 평화적인 의사표현 현장"},{"id":5,"channelId":"UCJNIJsUluHhuikAost77oCw","channelName":"쿨가이 tv","videoTitle":"2026/6/11#7일차#실시간 오늘도 잠실"},{"id":6,"channelId":"UCWS0tefWL5UpQsZI2yc8ASg","channelName":"일롱 머스크","videoTitle":"[실시간] 잠실 올림픽공원 오후반 오늘도 왔습니다ㅣ생일날 여길 올 줄이야"},{"id":7,"channelId":"UCFD4SJ_zPtqJotoqWdnRDLw","channelName":"팩트룸코리아","videoTitle":"6.11. &quot;6.3잠실국민행쟁&quot;올림핔공원 &quot;윤어게인&quot; &quot;자유민주주의를 지키는 목소리&quot;"},{"id":8,"channelId":"UCsaIrvP4Xzjcf031idR1bCA","channelName":"전사 부배달&뭉찌","videoTitle":"[24시 애국인의 삶] 잠실경기장 재선거 위장 대진연 섬멸 즌사주니어 키우기"}];
if (savedLayout) savedLayout.forEach((s,i)=>{ if(i<N) slots[i]={...s,id:i}; });

// ══════════════════════════════════════════
// 앱 렌더
// ══════════════════════════════════════════
document.addEventListener('DOMContentLoaded', ()=> renderApp());

function renderApp(){
  document.getElementById('app').innerHTML = isAdmin ? buildAdmin() : buildViewer();
  isAdmin ? initAdmin() : initViewer();
}

// ══════════════════════════════════════════
// 방문자 화면 — 9슬롯 실시간 embed
// ══════════════════════════════════════════
function buildViewer(){
  const used = slots.filter(s=>s.channelId).length;
  return `
  <header>
    <div class="logo">LIVE<em>VIEW</em></div>
    <div class="vline"></div>
    <div class="live-indicator">
      <div class="live-dot"></div>
      <span style="font-size:12px;color:var(--text-dim)">${used}개 채널 라이브</span>
    </div>
    <div class="viewer-right">
      <input class="pw-input" type="password" id="adminPwInput" placeholder="관리자">
      <button class="btn btn-outline btn-sm" onclick="tryLogin()">접속</button>
    </div>
  </header>
  <div class="content">
    <div class="viewer-grid" id="viewerGrid"></div>
  </div>
  <div class="statusbar">
    <span><span class="s-live">● ${used}</span>&nbsp;채널 재생 중</span>
    <span class="s-hint">슬롯 클릭 → 유튜브에서 열기</span>
  </div>`;
}

function initViewer(){
  const wrap = document.getElementById('viewerGrid');
  slots.forEach((s,i)=>{
    const cell = document.createElement('div');
    cell.className = 'cell'+(i===0?' main-cell':'');
    buildViewerCell(cell, s, i);
    wrap.appendChild(cell);
  });
  document.getElementById('adminPwInput').addEventListener('keydown', e=>{
    if(e.key==='Enter') tryLogin();
  });
}

function buildViewerCell(cell, s, i){
  if(!s.channelId){
    cell.innerHTML=`<div class="ph"><div class="ph-num">${i===0?'MAIN':'#'+(i+1)}</div><div class="ph-label">${i===0?'메인 화면':'대기 중'}</div></div>`;
    return;
  }
  cell.innerHTML=`
    <div class="live-badge-cell">LIVE</div>
    <iframe src="https://www.youtube.com/embed/live_stream?channel=${s.channelId}&autoplay=1&mute=1&rel=0&modestbranding=1"
      allow="autoplay;encrypted-media;fullscreen" allowfullscreen></iframe>
    <div class="cell-label">${esc(s.channelName||'')}</div>`;
  cell.style.cursor='pointer';
  cell.addEventListener('click', e=>{
    if(e.target.tagName==='IFRAME') return;
    window.open(`https://www.youtube.com/channel/${s.channelId}`,'_blank');
  });
}

// ══════════════════════════════════════════
// 관리자 화면
// ══════════════════════════════════════════
function buildAdmin(){
  return `
  <header>
    <div class="logo">LIVE<em>VIEW</em></div>
    <div class="vline"></div>
    <span class="admin-badge">🔧 ADMIN</span>
    <div class="vline"></div>
    <span style="font-size:10px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.06em;flex-shrink:0">API KEY</span>
    <input type="password" id="apiKey" placeholder="YouTube Data API v3 키" value="${sessionStorage.getItem('lv_api')||''}">
    <div class="vline"></div>
    <input type="text" id="searchInput" placeholder="검색어 입력 (예: 잠실, 부정선거, KBS뉴스...)">
    <button class="btn btn-red" id="btnLive">🔴 라이브만</button>
    <button class="btn btn-outline" id="btnAll">🔍 전체</button>
    <div class="vline"></div>
    <button class="btn btn-green" id="btnSave">💾 배치 저장</button>
    <button class="btn btn-outline btn-sm" id="btnCh" onclick="showChModal()">📋 저장채널</button>
    <button class="btn btn-outline btn-sm" id="btnLogout">로그아웃</button>
  </header>
  <div class="content">
    <div class="admin-main">
      <!-- 슬롯 선택 바 -->
      <div class="slot-bar" id="slotBar"></div>
      <!-- 검색결과 카드 그리드 (스크롤) -->
      <div class="results-grid" id="resultsGrid">
        <div class="empty-state">
          <span class="ei">🔍</span>
          검색어를 입력하고 라이브 방송을 찾으세요.<br>
          <span class="sub">
            🔴 라이브만: 현재 방송 중인 영상만 표시<br>
            🔍 전체: 라이브 + 일반 영상 모두 표시<br>
            카드 클릭 → 슬롯 배치 / ↗ 버튼 → YouTube에서 열기
          </span>
        </div>
      </div>
    </div>
  </div>
  <div class="statusbar">
    <span><span class="s-live" id="sLive">● 0</span>&nbsp;슬롯 사용</span>
    <span class="s-slots" id="sSlots">0/9</span>
    <span id="sSearch" style="color:var(--text-dim)"></span>
    <span class="s-hint">슬롯 칩 클릭 → 배치 대상 선택 &nbsp;|&nbsp; 카드 클릭 → 선택 슬롯에 배치 &nbsp;|&nbsp; 💾 저장 → 방문자에게 표시</span>
  </div>`;
}

function initAdmin(){
  document.getElementById('btnLive').addEventListener('click', ()=>doSearch(true));
  document.getElementById('btnAll').addEventListener('click', ()=>doSearch(false));
  document.getElementById('btnSave').addEventListener('click', saveLayout);
  document.getElementById('btnLogout').addEventListener('click', logout);
  document.getElementById('searchInput').addEventListener('keydown', e=>{
    if(e.key==='Enter') doSearch(false);
  });
  document.getElementById('apiKey').addEventListener('change', ()=>{
    sessionStorage.setItem('lv_api', document.getElementById('apiKey').value.trim());
  });
  renderSlotBar();
  updateStatus();
}

// ── 슬롯 선택 바 ──
function renderSlotBar(){
  const bar = document.getElementById('slotBar');
  if(!bar) return;
  bar.innerHTML = `<span class="slot-bar-label">배치 슬롯 선택 →</span>` +
    slots.map((s,i)=>`
      <div class="slot-chip ${s.channelId?'filled':''} ${selectedSlot===i?'selected':''}"
           onclick="selectSlot(${i})">
        ${i===0?'MAIN':'#'+(i+1)}
        ${s.channelId?`<span style="font-size:8px;opacity:.7">${esc(s.channelName?.slice(0,6)||'')}</span>`:''}
      </div>`).join('') +
    `<button class="btn btn-outline btn-sm" style="margin-left:4px;font-size:10px" onclick="clearAllSlots()">전체 초기화</button>`;
}

function selectSlot(i){
  selectedSlot = (selectedSlot===i) ? null : i;
  renderSlotBar();
  if(selectedSlot!==null) toast(`슬롯 ${i===0?'MAIN':'#'+(i+1)} 선택됨 — 카드를 클릭해서 배치`);
}

function clearAllSlots(){
  if(!confirm('모든 슬롯을 초기화하시겠습니까?')) return;
  slots.forEach((_,i)=>slots[i]={id:i,channelId:null,channelName:'',videoTitle:''});
  selectedSlot=null;
  renderSlotBar();
  updateStatus();
  toast('전체 초기화 완료');
}

// ── 검색 ──
async function doSearch(liveOnly){
  const key = document.getElementById('apiKey').value.trim();
  const q   = document.getElementById('searchInput').value.trim();
  if(!key){ toast('API 키를 먼저 입력해주세요.'); return; }
  if(!q){   toast('검색어를 입력해주세요.'); return; }

  const grid = document.getElementById('resultsGrid');
  grid.innerHTML = `<div class="empty-state"><div class="spinner"></div><br><br>검색 중...</div>`;
  document.getElementById('sSearch').textContent = '';

  // eventType=live 로 현재 라이브 영상 검색
  const params = new URLSearchParams({
    part:'snippet', q, type:'video', maxResults:50, key,
    relevanceLanguage:'ko', order:'viewCount',
    ...(liveOnly ? {eventType:'live'} : {})
  });

  try{
    const res = await fetch(`https://www.googleapis.com/youtube/v3/search?${params}`);
    const data = await res.json();
    if(data.error) throw new Error(data.error.message);

    searchResults = (data.items||[]).map(item=>({
      videoId:    item.id.videoId,
      channelId:  item.snippet.channelId,
      channelName:item.snippet.channelTitle,
      title:      item.snippet.title,
      thumb:      item.snippet.thumbnails?.medium?.url || item.snippet.thumbnails?.default?.url || '',
      isLive:     item.snippet.liveBroadcastContent === 'live',
      viewCount:  null
    }));

    renderResultCards(searchResults, liveOnly);
    document.getElementById('sSearch').textContent = `검색결과 ${searchResults.length}개`;

    // 자동으로 첫 번째 빈 슬롯 선택
    if(selectedSlot===null){
      const firstEmpty = slots.findIndex(s=>!s.channelId);
      if(firstEmpty!==-1){ selectedSlot=firstEmpty; renderSlotBar(); }
    }

  }catch(err){
    grid.innerHTML = `<div class="empty-state" style="color:var(--accent)">⚠️ ${esc(err.message)}</div>`;
  }
}

function renderResultCards(items, liveOnly){
  const grid = document.getElementById('resultsGrid');
  if(!items.length){
    grid.innerHTML=`<div class="empty-state"><span class="ei">😶</span>${liveOnly?'현재 라이브 중인 방송이 없습니다.':'검색 결과가 없습니다.'}</div>`;
    return;
  }

  // 현재 슬롯에 배치된 channelId 목록
  const placedIds = new Set(slots.map(s=>s.channelId).filter(Boolean));

  grid.innerHTML = items.map((r,idx)=>{
    const placedSlot = slots.findIndex(s=>s.channelId===r.channelId);
    const slotLabel = placedSlot!==-1 ? `${placedSlot===0?'MAIN':'#'+(placedSlot+1)}` : null;
    // 라이브면 채널 live_stream embed, 아니면 영상 embed
    const embedSrc = r.isLive
      ? `https://www.youtube.com/embed/live_stream?channel=${r.channelId}&autoplay=1&mute=1&rel=0&modestbranding=1`
      : `https://www.youtube.com/embed/${r.videoId}?autoplay=0&mute=1&rel=0&modestbranding=1`;
    return `
    <div class="rcard ${slotLabel?'selected':''}" id="rcard-${idx}">
      <div class="rcard-thumb">
        <iframe src="${embedSrc}" allow="autoplay;encrypted-media" allowfullscreen></iframe>
        ${r.isLive?'<div class="rcard-live">LIVE</div>':''}
        ${slotLabel?`<div class="rcard-slot">${slotLabel}</div>`:''}
      </div>
      <div class="rcard-body">
        <div class="rcard-title">${esc(r.title)}</div>
        <div class="rcard-ch">${esc(r.channelName)}</div>
        <div class="rcard-actions">
          <button class="rcard-btn rcard-btn-place" onclick="placeCard(${idx})">
            ${slotLabel ? '✓ 배치됨' : '+ 슬롯 배치'}
          </button>
          <button class="rcard-btn rcard-btn-yt" onclick="openVideo(event,'${r.videoId}')">↗ YT</button>
        </div>
      </div>
    </div>`}).join('');
}

function placeCard(idx){
  const r = searchResults[idx];
  // 배치 대상 슬롯 결정
  let target = selectedSlot;
  if(target===null){
    target = slots.findIndex(s=>!s.channelId);
    if(target===-1){ toast('슬롯이 가득 찼습니다. 슬롯 칩에서 교체할 슬롯을 선택해주세요.'); return; }
  }
  slots[target] = {id:target, channelId:r.channelId, channelName:r.channelName, videoTitle:r.title};

  // 다음 빈 슬롯으로 자동 이동
  const nextEmpty = slots.findIndex((s,i)=>i!==target && !s.channelId);
  selectedSlot = nextEmpty!==-1 ? nextEmpty : null;

  renderSlotBar();
  updateStatus();
  // 카드 UI 업데이트
  renderResultCards(searchResults, false);
  toast(`"${r.channelName}" → 슬롯 ${target===0?'MAIN':'#'+(target+1)} 배치 완료`);
}

function openVideo(e, videoId){
  e.stopPropagation();
  window.open(`https://www.youtube.com/watch?v=${videoId}`,'_blank');
}

// ── 배치 저장 → index.html 다운로드 ──
function saveLayout(){
  // 현재 HTML 소스를 가져와서 슬롯 데이터를 하드코딩해 다운로드
  const layoutJson = JSON.stringify(slots.map(s=>({
    id:s.id, channelId:s.channelId||null, channelName:s.channelName||'', videoTitle:s.videoTitle||''
  })));

  // 현재 페이지 HTML에서 초기 slots 선언 부분을 저장된 데이터로 교체
  fetch(location.href)
    .then(r=>r.text())
    .then(html=>{
      // savedLayout 주입: BAKED_LAYOUT 마커로 교체
      const patched = html.replace(
        /const savedLayout = JSON\.parse\(localStorage\.getItem\('lv_layout'\) \|\| 'null'\);[\s\S]*?if \(savedLayout\) savedLayout\.forEach\(\(s,i\)=>\{ if\(i<N\) slots\[i\]=\{\.\.\.s,id:i\}; \}\);/,
        `const savedLayout = ${layoutJson};\nif (savedLayout) savedLayout.forEach((s,i)=>{ if(i<N) slots[i]={...s,id:i}; });`
      );
      const blob = new Blob([patched], {type:'text/html'});
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'index.html';
      a.click();
      toast('✅ index.html 다운로드 완료! GitHub에 업로드하세요.');
    })
    .catch(()=>{
      // fetch 실패시(로컬파일 등) localStorage fallback
      localStorage.setItem('lv_layout', JSON.stringify(slots));
      toast('⚠️ 로컬 저장 완료. GitHub 배포 환경에서 다시 시도하세요.');
    });
}

// ── 저장 채널 모달 ──
function showChModal(){
  const list = savedChannels.map((ch,i)=>`
    <div style="display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--border)">
      <div style="flex:1;min-width:0">
        <div style="font-size:13px;font-weight:600;color:var(--text)">${esc(ch.name)}</div>
        <div style="font-size:10px;color:var(--text-muted);font-family:'JetBrains Mono',monospace">${esc(ch.channelId)}</div>
      </div>
      <button class="btn btn-green btn-sm" onclick="placeChDirect('${ch.channelId}','${esc(ch.name)}')">배치</button>
      <button class="btn btn-outline btn-sm" onclick="delChannel(${i})" style="color:var(--accent);border-color:var(--accent)">삭제</button>
    </div>`).join('') || '<div style="color:var(--text-muted);font-size:12px;padding:16px 0;text-align:center">저장된 채널이 없습니다.</div>';

  document.getElementById('modalContent').innerHTML=`
    <h3 style="font-size:14px;font-weight:700;color:var(--text);margin-bottom:12px">📋 저장된 채널 목록</h3>
    <div style="max-height:260px;overflow-y:auto">${list}</div>
    <div style="margin-top:14px;padding-top:12px;border-top:1px solid var(--border)">
      <div style="font-size:11px;font-weight:700;color:var(--text-dim);margin-bottom:8px">채널 추가</div>
      <div style="display:flex;flex-direction:column;gap:6px">
        <input type="text" id="mChName" placeholder="채널 이름" style="font-size:12px;padding:6px 10px;width:100%">
        <div style="display:flex;gap:6px">
          <input type="text" id="mChId" placeholder="채널ID (UCxxxxxxxx...)" style="font-size:12px;padding:6px 10px;flex:1">
          <button class="btn btn-red btn-sm" onclick="saveChannel()">저장</button>
        </div>
        <div style="font-size:10px;color:var(--text-muted)">채널ID 찾기: youtube.com/channel/<strong>UC...</strong> 주소에서 복사</div>
      </div>
    </div>
    <button class="btn btn-outline" style="margin-top:14px;font-size:12px;width:100%" onclick="hideModal()">닫기</button>`;
  document.getElementById('modalBg').classList.add('show');
}

function saveChannel(){
  const name = document.getElementById('mChName').value.trim();
  const cid  = document.getElementById('mChId').value.trim();
  if(!name||!cid){ toast('이름과 채널ID를 모두 입력해주세요.'); return; }
  if(!/^UC[a-zA-Z0-9_-]{22}$/.test(cid)){ toast('채널ID는 UC로 시작하는 24자리여야 합니다.'); return; }
  savedChannels.push({name, channelId:cid});
  localStorage.setItem('lv_channels', JSON.stringify(savedChannels));
  showChModal();
  toast(`"${name}" 저장 완료`);
}

function delChannel(i){
  savedChannels.splice(i,1);
  localStorage.setItem('lv_channels', JSON.stringify(savedChannels));
  showChModal();
}

function placeChDirect(channelId, channelName){
  let target = selectedSlot;
  if(target===null){ target=slots.findIndex(s=>!s.channelId); }
  if(target===-1){ toast('슬롯이 가득 찼습니다.'); return; }
  slots[target]={id:target, channelId, channelName, videoTitle:''};
  const next=slots.findIndex((s,i)=>i!==target&&!s.channelId);
  selectedSlot=next!==-1?next:null;
  renderSlotBar(); updateStatus();
  renderResultCards(searchResults, false);
  hideModal();
  toast(`${channelName} → 슬롯 ${target===0?'MAIN':'#'+(target+1)}`);
}

// ── 로그인/로그아웃 ──
function tryLogin(){
  const pw=document.getElementById('adminPwInput').value.trim();
  if(pw===ADMIN_PASSWORD){ isAdmin=true; renderApp(); toast('관리자 모드'); }
  else{ toast('비밀번호가 틀렸습니다.'); document.getElementById('adminPwInput').value=''; }
}
function logout(){ isAdmin=false; renderApp(); }

// ── 상태 업데이트 ──
function updateStatus(){
  const liveEl=document.getElementById('sLive');
  const slotsEl=document.getElementById('sSlots');
  if(!liveEl||!slotsEl) return;
  const used=slots.filter(s=>s.channelId).length;
  liveEl.textContent=`● ${used}`;
  slotsEl.textContent=`${used}/9`;
}

// ── 헬퍼 ──
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;')}
let _tt;
function toast(msg){const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');clearTimeout(_tt);_tt=setTimeout(()=>el.classList.remove('show'),2600)}
function hideModal(){document.getElementById('modalBg').classList.remove('show')}
function showHelp(){}
function hideHelp(){}
</script>
